openapi: 3.0.0
info:
  title: Flowboard API
  version: 1.0.0
paths:
  /api/health:
    get:
      summary: Check the health of the service
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: flowboard